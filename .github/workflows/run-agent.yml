name: Run SEO Gap Agent

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 1'

jobs:
  run-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r seo-gap-agent/requirements.txt

      - name: Run agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GSC_CLIENT_ID: ${{ secrets.GSC_CLIENT_ID }}
          GSC_CLIENT_SECRET: ${{ secrets.GSC_CLIENT_SECRET }}
          GSC_REFRESH_TOKEN: ${{ secrets.GSC_REFRESH_TOKEN }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          EXCLUDE_BRAND_QUERIES: ${{ secrets.EXCLUDE_BRAND_QUERIES }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: |
          cd seo-gap-agent
          python app/main.py

      - name: Upload reports artifact
        uses: actions/upload-artifact@v4
        with:
          name: seo-gap-agent-reports
          path: |
            seo-gap-agent/reports/*.csv
            seo-gap-agent/reports/*.md
            seo-gap-agent/reports/*.json
