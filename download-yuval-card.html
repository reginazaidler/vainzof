<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>הורדת כרטיס החג של יובל</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Assistant", "Heebo", Arial, sans-serif;
      background: #f3f6f9;
      color: #0f172a;
      padding: 24px;
    }

    .box {
      width: min(720px, 100%);
      background: #fff;
      border: 1px solid #dbe4ee;
      border-radius: 20px;
      box-shadow: 0 20px 44px rgba(15, 23, 42, 0.08);
      padding: 28px;
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(28px, 4vw, 38px);
    }

    p {
      margin: 0 0 20px;
      line-height: 1.6;
      font-size: 20px;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      background: #1d4ed8;
      color: #fff;
      padding: 14px 22px;
      border-radius: 999px;
      font-size: 20px;
      font-weight: 700;
    }

    .btn:hover {
      background: #1e40af;
    }
  </style>
</head>
<body>
  <main class="box">
    <h1>הורדת כרטיס החג</h1>
    <p>לחצי על הכפתור למטה והקובץ ירד ישירות כ־JPG למחשב או לטלפון.</p>
    <a class="btn" href="assets/pesach.jpeg" download>הורדה ישירה של הקובץ</a>
  </main>
</body>
</html>
